<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadrant</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        height: 100vh;
        width: 100%;
        background: url('https://raw.githubusercontent.com/binayak2025/quadrant-desktop-image/main/background.jpg') no-repeat center center;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .overlay {
        background: rgba(0, 0, 0, 0.4);
        padding: 40px 60px;
        border-radius: 12px;
        text-align: center;
        backdrop-filter: blur(8px);
    }

    .logo {
        font-size: 48px;
        font-weight: bold;
        color: white;
        letter-spacing: 3px;
    }

    .subtitle {
        margin-top: 10px;
        color: #ddd;
        font-size: 16px;
    }

    @media (max-width: 768px) {
        .logo {
            font-size: 32px;
        }

        .overlay {
            padding: 20px 30px;
        }
    }

</body>
</html>
